name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Compute version
        id: vars
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_NUM="${{ github.run_number }}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=build-$BUILD_NUM-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version=1.0.$BUILD_NUM" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore LocalizationEditorNET9.csproj

      - name: Publish (win-x64, self-contained, single-file)
        run: >
          dotnet publish LocalizationEditorNET9.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=${{ steps.vars.outputs.version }}
          -o publish

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release
          cp publish/LocalizationEditorNET9.exe "release/LocalizationEditorNET9-${{ steps.vars.outputs.version }}-win-x64.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalizationEditorNET9-win-x64
          path: release/*.exe
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Build ${{ steps.vars.outputs.version }} (${{ steps.vars.outputs.short_sha }})
          body: |
            Automated build from commit ${{ github.sha }}.

            Download `LocalizationEditorNET9-${{ steps.vars.outputs.version }}-win-x64.exe` below and run it on Windows x64 — no .NET install required.
          files: release/*.exe
          draft: false
          prerelease: false
